<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecurePass Manager</title>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f7f8fa;
      --bg-hover: #eef1f5;
      --bg-active: #e6eaf0;
      --text-primary: #101828;
      --text-secondary: #475467;
      --text-muted: #667085;
      --border-color: #d0d5dd;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-light: #dbeafe;
      --success: #079455;
      --warning: #dc6803;
      --danger: #d92d20;
      --radius: 6px;
      --shadow: 0 8px 20px rgba(16, 24, 40, 0.12);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #161b22;
        --bg-secondary: #0d1117;
        --bg-hover: #21262d;
        --bg-active: #30363d;
        --text-primary: #f0f6fc;
        --text-secondary: #c9d1d9;
        --text-muted: #8b949e;
        --border-color: #30363d;
        --accent: #3fb950;
        --accent-hover: #2ea043;
        --accent-light: #12361f;
        --success: #3fb950;
        --warning: #d29922;
        --danger: #f85149;
        --shadow: 0 8px 20px rgba(1, 4, 9, 0.4);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: min(380px, 100vw);
      max-width: 380px;
      min-width: 320px;
      max-height: 600px;
      min-height: 240px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 13px;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-primary);
      flex-shrink: 0;
    }

    .header-left {
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-width: 0;
    }

    .logo {
      width: 32px;
      height: 32px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      background: var(--accent);
      color: #ffffff;
      font-size: 12px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .brand {
      min-width: 0;
    }

    .brand-title {
      font-size: 14px;
      line-height: 18px;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .vault-name {
      margin-top: 1px;
      font-size: 12px;
      line-height: 16px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 190px;
    }

    .vault-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 86px;
      justify-content: center;
      padding: 6px 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
      cursor: default;
    }

    .vault-badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .vault-badge.unlocked .vault-badge-dot {
      background: var(--success);
    }

    .vault-badge.locked .vault-badge-dot {
      background: var(--danger);
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .status-left {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.connected { background: var(--success); }
    .status-dot.disconnected { background: var(--danger); }
    .status-dot.connecting { background: var(--warning); }

    .match-count {
      min-width: 22px;
      padding: 2px 7px;
      border-radius: var(--radius);
      background: var(--accent-light);
      color: var(--accent);
      text-align: center;
      font-size: 12px;
      font-weight: 700;
    }

    .search-wrapper {
      position: relative;
      padding: 10px 14px;
      flex-shrink: 0;
    }

    .search-input {
      width: 100%;
      height: 36px;
      padding: 0 12px 0 34px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      background: var(--bg-primary);
      color: var(--text-primary);
      outline: none;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18);
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-icon {
      position: absolute;
      top: 50%;
      left: 24px;
      width: 15px;
      height: 15px;
      color: var(--text-muted);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .separator {
      height: 1px;
      background: var(--border-color);
      flex-shrink: 0;
    }

    .content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      background: var(--bg-primary);
    }

    .content::-webkit-scrollbar {
      width: 6px;
    }

    .content::-webkit-scrollbar-thumb {
      background: var(--bg-active);
      border-radius: 3px;
    }

    .state-message {
      padding: 30px 22px;
      display: grid;
      justify-items: center;
      gap: 8px;
      text-align: center;
      color: var(--text-secondary);
      line-height: 18px;
    }

    .state-icon {
      min-width: 34px;
      height: 34px;
      padding: 0 8px;
      border-radius: var(--radius);
      display: inline-grid;
      place-items: center;
      background: var(--bg-active);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 800;
    }

    .state-icon-lock {
      min-width: 50px;
    }

    .state-title {
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 700;
    }

    .state-desc {
      max-width: 280px;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .state-domain {
      max-width: 280px;
      padding: 6px 8px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      background: var(--bg-secondary);
      color: var(--text-muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .state-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .state-action,
    .state-actions .btn {
      min-width: 112px;
    }

    .state-troubleshooting {
      width: min(280px, 100%);
      margin: 4px 0 0;
      padding: 10px 12px 10px 28px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 17px;
      text-align: left;
    }

    .state-action {
      width: auto;
      min-width: 150px;
      margin-top: 4px;
    }

    .credential-item {
      min-height: 58px;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) auto 14px;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
      transition: background-color 0.12s ease;
    }

    .credential-item:hover,
    .credential-item.expanded {
      background: var(--bg-hover);
    }

    .credential-favicon {
      width: 34px;
      height: 34px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      overflow: hidden;
      background: var(--bg-active);
      color: var(--text-secondary);
      font-size: 10px;
      font-weight: 800;
    }

    .credential-favicon img {
      width: 22px;
      height: 22px;
      object-fit: contain;
    }

    .credential-info {
      min-width: 0;
    }

    .credential-title {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 700;
      line-height: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .credential-username {
      margin-top: 1px;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .credential-row-actions {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 800;
    }

    .icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    .credential-chevron {
      color: var(--text-muted);
      font-size: 12px;
      transition: transform 0.12s ease;
    }

    .credential-item.expanded .credential-chevron {
      transform: rotate(180deg);
    }

    .credential-actions-row {
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-secondary);
    }

    .credential-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 10px 14px 12px 58px;
    }

    .credential-detail {
      width: 100%;
      margin-bottom: 1px;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .action-btn {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 10px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .action-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    .action-btn.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .action-btn.primary:hover {
      background: var(--accent-hover);
      color: #ffffff;
    }

    .action-icon {
      font-size: 11px;
      font-weight: 800;
    }

    .otp-badge {
      flex-shrink: 0;
      padding: 1px 5px;
      border-radius: 4px;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 10px;
      line-height: 14px;
      font-weight: 800;
    }

    .footer {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 10px 14px;
      border-top: 1px solid var(--border-color);
      background: var(--bg-secondary);
      flex-shrink: 0;
    }

    .btn {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 7px 10px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #ffffff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      border-color: var(--border-color);
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
      color: var(--accent);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 12px;
      max-width: 330px;
      transform: translateX(-50%) translateY(70px);
      padding: 9px 12px;
      border-radius: var(--radius);
      background: var(--text-primary);
      color: var(--bg-primary);
      box-shadow: var(--shadow);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: transform 0.2s ease;
      z-index: 10;
    }

    .toast.visible {
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 340px) {
      body {
        min-width: 300px;
      }

      .credential-item {
        grid-template-columns: 34px minmax(0, 1fr) 14px;
      }

      .credential-row-actions {
        display: none;
      }

      .footer {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <div class="logo" aria-hidden="true">SP</div>
      <div class="brand">
        <h1 class="brand-title">SecurePass</h1>
        <div class="vault-name" id="vaultName">Checking vault...</div>
      </div>
    </div>
    <button class="vault-badge locked" id="vaultBadge" type="button" disabled>
      <span class="vault-badge-dot" aria-hidden="true"></span>
      <span id="vaultBadgeText">Locked</span>
    </button>
  </header>

  <div class="status-bar" id="statusBar">
    <div class="status-left">
      <div class="status-dot connecting" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
    <span class="match-count" id="matchCount" style="display:none;">0</span>
  </div>

  <div class="search-wrapper" id="searchWrapper" style="display:none;">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.35-4.35"></path>
    </svg>
    <input type="text" class="search-input" id="searchInput" placeholder="Search credentials..." autocomplete="off" />
  </div>

  <div class="separator" id="searchSeparator" style="display:none;"></div>

  <main class="content" id="content">
    <div class="state-message" id="loadingState">
      <span class="state-icon" aria-hidden="true">...</span>
      <div class="state-title">Connecting...</div>
      <div class="state-desc">Establishing secure connection to desktop app.</div>
    </div>
  </main>

  <footer class="footer" id="footer">
    <button class="btn btn-secondary" id="refreshBtn" type="button">Refresh</button>
    <button class="btn btn-primary" id="openAppBtn" type="button">Open Full App</button>
    <button class="btn btn-secondary" id="settingsBtn" type="button">Settings</button>
  </footer>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module" src="./index.ts"></script>
</body>
</html>
