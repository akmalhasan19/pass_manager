name: Build & Package Extension

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Manual version override (optional)'
        required: false
        default: ''

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: browser-extension
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: browser-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

  build-chrome:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: browser-extension/package-lock.json

      - name: Install dependencies
        run: |
          cd browser-extension
          npm ci

      - name: Build Chrome extension
        run: |
          cd browser-extension
          npm run build:chrome

      - name: Package Chrome extension
        run: |
          cd browser-extension
          npm run package:chrome

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v4
        with:
          name: securepass-extension-chrome
          path: browser-extension/releases/securepass-extension-chrome.zip

  build-firefox:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: browser-extension/package-lock.json

      - name: Install dependencies
        run: |
          cd browser-extension
          npm ci

      - name: Build Firefox extension
        run: |
          cd browser-extension
          npm run build:firefox

      - name: Package Firefox extension
        run: |
          cd browser-extension
          npm run package:firefox

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v4
        with:
          name: securepass-extension-firefox
          path: browser-extension/releases/securepass-extension-firefox.zip

  build-edge:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: browser-extension/package-lock.json

      - name: Install dependencies
        run: |
          cd browser-extension
          npm ci

      - name: Build Edge extension
        run: |
          cd browser-extension
          npm run build:edge

      - name: Package Edge extension
        run: |
          cd browser-extension
          npm run package:edge

      - name: Upload Edge artifact
        uses: actions/upload-artifact@v4
        with:
          name: securepass-extension-edge
          path: browser-extension/releases/securepass-extension-edge.zip

  release-all:
    runs-on: ubuntu-latest
    needs: [build-chrome, build-firefox, build-edge]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: releases/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/**/*.zip
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
